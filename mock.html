<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>EarnX Mock</title>

  <link rel="stylesheet" href="./mock.css">
</head>
<body>

  <div class="app">

    <!-- SIDEBAR -->
    <aside class="sidebar">

      <div class="logo">EarnX</div>

      <nav class="nav">

        <div class="nav-item active">
          Home
        </div>

        <div class="nav-item">
          Discover
        </div>

        <div class="nav-item">
          Profile
        </div>

        <div class="nav-item">
          Wallet
        </div>

      </nav>

    </aside>

    <!-- MAIN -->
    <main class="main">

      <!-- STORIES -->
      <section class="stories">

        <div class="story" data-name="RA"></div>
        <div class="story" data-name="MK"></div>
        <div class="story" data-name="PX"></div>
        <div class="story" data-name="JL"></div>
        <div class="story" data-name="AN"></div>

      </section>

      <!-- FEED -->
      <section class="feed">

        <article class="post">

          <div class="post-header">

            <div class="avatar">
              RA
            </div>

            <div>
              <div class="username">
                Rafael Amaral
              </div>

              <div class="time">
                2h ago
              </div>
            </div>

          </div>

          <div class="post-body">
            Building the future of creator monetization on EarnX 🚀
          </div>

          <div class="post-image"></div>

          <div class="post-actions">
            <span>❤️ 1.2K</span>
            <span>💬 84</span>
            <span>↗ Share</span>
          </div>

        </article>

        <article class="post">

          <div class="post-header">

            <div class="avatar">
              MK
            </div>

            <div>
              <div class="username">
                Mika
              </div>

              <div class="time">
                5h ago
              </div>
            </div>

          </div>

          <div class="post-body">
            Momentum is becoming the new creator currency.
          </div>

          <div class="post-image alt"></div>

          <div class="post-actions">
            <span>❤️ 842</span>
            <span>💬 42</span>
            <span>↗ Share</span>
          </div>

        </article>

      </section>

    </main>

    <!-- RIGHT PANEL -->
    <aside class="right-panel">

      <div class="panel">

        <div class="panel-title">
          Trending Creators
        </div>

        <div class="trend">
          Ariana ▲ 12%
        </div>

        <div class="trend">
          Jonas ▲ 8%
        </div>

        <div class="trend">
          Luna ▲ 21%
        </div>

      </div>

    </aside>

  </div>

  <script src="./mock.js"></script>

</body>
</html>
