<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EarnX Home</title>
  <link rel="stylesheet" href="mock.css" />
<link rel="stylesheet" href="styles.css" />
  <script src="mock.js"></script>
<body>

  <header class="topbar">
    <div class="logo">EarnX</div>
  </header>

  <!-- STORIES -->
 <section class="stories">
  <div class="story" data-initial="RA"></div>
  <div class="story" data-initial="MK"></div>
  <div class="story" data-initial="JL"></div>
  <div class="story" data-initial="AN"></div>
  <div class="story" data-initial="PX"></div>
</section>

  <!-- FEED -->
  <main class="feed">

    <div class="card">
      <div class="card-header">
        <div class="avatar">RA</div>
        <div>
          <div class="name">Rafael Amaral</div>
          <div class="time">2h ago</div>
        </div>
      </div>
      <div class="card-body">
        Building the future of creator monetization on EarnX 🚀
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <div class="avatar">MK</div>
        <div>
          <div class="name">Mika</div>
          <div class="time">5h ago</div>
        </div>
      </div>
      <div class="card-body">
        Just hit 12k interactions this week. Momentum is real.
      </div>
    </div>

  </main>

</body>
</html>
