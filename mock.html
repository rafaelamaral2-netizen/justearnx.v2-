<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EarnX Mock 2.0</title>

  <link rel="stylesheet" href="./styles.css">
</head>
<body>

  <div class="app-layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="logo">EarnX</div>

      <nav class="nav">
        <div class="nav-item active">Home</div>
        <div class="nav-item">Discover</div>
        <div class="nav-item">Profile</div>
        <div class="nav-item">Wallet</div>
      </nav>
    </aside>

    <!-- MAIN -->
    <main class="main-feed">

      <!-- STORIES -->
      <section class="stories">
        <div class="story" data-name="RA"></div>
        <div class="story" data-name="MK"></div>
        <div class="story" data-name="AN"></div>
        <div class="story" data-name="PX"></div>
        <div class="story" data-name="JL"></div>
      </section>

      <!-- POST -->
      <section class="feed">

        <article class="post-card">

          <div class="post-header">
            <div class="avatar">RA</div>

            <div>
              <div class="username">Rafael Amaral</div>
              <div class="post-time">2h ago</div>
            </div>

          </div>

          <div class="post-content">
            Building the future of creator monetization on EarnX 🚀
          </div>

          <div class="post-image"></div>

          <div class="post-actions">
            <span>❤️ 1.2K</span>
            <span>💬 86</span>
            <span>↗ Share</span>
          </div>

        </article>

      </section>

    </main>

    <!-- RIGHT PANEL -->
    <aside class="right-panel">

      <div class="panel-card">
        <div class="panel-title">Trending Creators</div>

        <div class="trend-user">Ariana ▲ 12%</div>
        <div class="trend-user">Luna ▲ 8%</div>
        <div class="trend-user">Jonas ▲ 21%</div>
      </div>

    </aside>

  </div>

  <script src="./mock.js"></script>

</body>
</html>
