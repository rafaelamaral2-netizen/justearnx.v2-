<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EARNX INLINE TEST</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #ff0000;
      color: #ffffff;
      font-family: Arial, sans-serif;
    }

    .box {
      background: #000000;
      border: 4px solid #00ff66;
      border-radius: 20px;
      padding: 32px;
      text-align: center;
      max-width: 700px;
      margin: 20px;
    }

    h1 {
      font-size: 42px;
      margin: 0 0 16px;
      color: #00ff66;
    }

    p {
      font-size: 22px;
      margin: 10px 0;
    }

    button {
      margin-top: 20px;
      padding: 14px 22px;
      border: none;
      border-radius: 12px;
      background: #00ff66;
      color: #000;
      font-weight: 700;
      font-size: 18px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>EARNX INLINE TEST</h1>
    <p>Si ves esto, GitHub Pages sí está publicando este archivo.</p>
    <p id="status">JS no cargó todavía</p>
    <button id="btn">Probar JS</button>
  </div>

  <script>
    document.getElementById("status").textContent = "JS cargó correctamente";
    document.getElementById("btn").addEventListener("click", function () {
      alert("HTML + CSS + JS inline funcionando");
    });
  </script>
</body>
</html>
